<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ collection['name'] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-0">{{ collection['name'] }}</h2>
            <p class="text-muted mb-0">{{ collection['description'] or 'No description' }}</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/collections" class="btn btn-outline-warning">Collections</a>
            <a href="/" class="btn btn-secondary">Back Home</a>
        </div>
    </div>

    <div class="row g-4">
        {% for item in items %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="card h-100 shadow-sm">
                {% if item['poster'] %}
                <img src="{{ image_url }}{{ item['poster'] }}" class="card-img-top" style="height:350px; object-fit:cover;">
                {% endif %}
                <div class="card-body text-center">
                    <h6>{{ item['title'] }}</h6>
                    <small class="text-muted d-block mb-2">Added: {{ item['added_at'] }}</small>
                    <div class="d-flex justify-content-center gap-2">
                        <a href="/movie/{{ item['movie_id'] }}" class="btn btn-outline-primary btn-sm">Open</a>
                        <a href="/collections/{{ collection['id'] }}/remove/{{ item['movie_id'] }}" class="btn btn-danger btn-sm">Remove</a>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No movies in this collection yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
