<!DOCTYPE html>
<html>
<head>
    <title>Favorites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="mb-0">Your Favorite Movies</h2>
        <div class="d-flex gap-2">
            <a href="/history" class="btn btn-outline-primary">History</a>
            <a href="/upcoming" class="btn btn-outline-success">Upcoming</a>
            <a href="/collections" class="btn btn-outline-warning">Collections</a>
            <a href="/dashboard" class="btn btn-dark">Dashboard</a>
            <a href="/" class="btn btn-secondary">Back Home</a>
        </div>
    </div>

    <div class="row g-4">
        {% for movie in movies %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="card shadow-sm h-100">
                {% if movie[3] %}
                <img src="{{ image_url }}{{ movie[3] }}" class="card-img-top" style="height:350px; object-fit:cover;">
                {% endif %}
                <div class="card-body text-center">
                    <h6 class="card-title">{{ movie[2] }}</h6>
                    <a href="/movie/{{ movie[1] }}" class="btn btn-primary btn-sm mt-2">View</a>
                    <a href="/remove_favorite/{{ movie[1] }}" class="btn btn-danger btn-sm mt-2">Remove</a>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No favorite movies added yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
