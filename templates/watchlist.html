<!DOCTYPE html>
<html>
<head>
    <title>Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h3 class="mb-0">My Watchlist</h3>
        <div class="d-flex gap-2">
            <a href="/history" class="btn btn-outline-primary">History</a>
            <a href="/upcoming" class="btn btn-outline-success">Upcoming</a>
            <a href="/collections" class="btn btn-outline-warning">Collections</a>
            <a href="/dashboard" class="btn btn-dark">Dashboard</a>
            <a href="/" class="btn btn-secondary">Back Home</a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        {% for movie in movies %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                {% if movie[3] %}
                <img src="{{ image_url }}{{ movie[3] }}" class="card-img-top" style="height:350px; object-fit:cover;">
                {% endif %}
                <div class="card-body text-center">
                    <h6>{{ movie[2] }}</h6>
                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <a href="/movie/{{ movie[1] }}" class="btn btn-outline-primary btn-sm">View</a>
                        <a href="/remove_watchlist/{{ movie[1] }}" class="btn btn-danger btn-sm">Remove</a>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No movies in watchlist yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
